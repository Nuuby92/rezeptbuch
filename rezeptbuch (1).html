<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mein Rezeptbuch</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --green-darkest: #1B4332;
      --green-dark:    #2D6A4F;
      --green-mid:     #52B788;
      --green-light:   #D8F3DC;
      --green-faint:   #F0F9F4;
      --border:        #C6E8BD;
      --surface:       #ffffff;
      --bg:            #F4FAF5;
      --text:          #111827;
      --text-muted:    #6B7280;
      --text-sub:      #374151;
      --danger:        #DC2626;
      --danger-bg:     #FEE2E2;
    }
    html { font-family: system-ui, -apple-system, 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); }
    body { min-height: 100vh; }
    button { font-family: inherit; cursor: pointer; border: none; outline: none; }
    input, textarea { font-family: inherit; }
    input:focus, textarea:focus { border-color: var(--green-dark) !important; outline: none; }

    #app { display: flex; flex-direction: column; min-height: 100vh; }

    header { background: var(--surface); border-bottom: 1.5px solid var(--border); position: sticky; top: 0; z-index: 50; }
    .header-inner { max-width: 820px; margin: 0 auto; padding: 0 16px; display: flex; align-items: center; justify-content: space-between; height: 60px; }
    .logo { display: flex; align-items: center; gap: 10px; }
    .logo-icon { width: 36px; height: 36px; border-radius: 10px; background: linear-gradient(135deg, var(--green-dark), var(--green-mid)); display: flex; align-items: center; justify-content: center; }
    .logo-text { font-weight: 800; font-size: 18px; color: var(--text); }
    nav { display: flex; gap: 4px; }
    .nav-btn { display: flex; align-items: center; gap: 6px; padding: 6px 12px; border-radius: 8px; background: transparent; color: var(--text-muted); font-size: 13px; font-weight: 600; transition: all .15s; border: none; cursor: pointer; }
    .nav-btn.active { background: var(--green-light); color: var(--green-darkest); }
    .nav-btn:hover:not(.active) { background: var(--green-faint); }

    main { max-width: 820px; margin: 0 auto; padding: 28px 16px; flex: 1; width: 100%; }

    .btn { display: inline-flex; align-items: center; gap: 7px; padding: 8px 18px; border-radius: 8px; font-size: 14px; font-weight: 600; transition: all .15s; border: none; cursor: pointer; white-space: nowrap; font-family: inherit; }
    .btn-primary { background: var(--green-dark); color: #fff; }
    .btn-primary:hover { background: var(--green-darkest); }
    .btn-secondary { background: var(--green-light); color: var(--green-darkest); }
    .btn-secondary:hover { background: #c3e6c0; }
    .btn-ghost { background: transparent; color: var(--text-muted); }
    .btn-ghost:hover { background: var(--green-faint); }
    .btn-danger { background: var(--danger-bg); color: var(--danger); }
    .btn-sm { padding: 5px 12px; font-size: 13px; }
    .btn-icon { padding: 6px; }
    .remove-btn { background: var(--danger-bg); color: var(--danger); border: none; border-radius: 6px; padding: 5px; display: flex; align-items: center; justify-content: center; cursor: pointer; flex-shrink: 0; }

    .card { background: var(--surface); border-radius: 16px; border: 1.5px solid #E4F2E1; box-shadow: 0 1px 4px rgba(45,106,79,.07); transition: box-shadow .15s, border-color .15s; }
    .card:hover { box-shadow: 0 4px 18px rgba(45,106,79,.12); border-color: #A7D9A0; }

    .field { display: flex; flex-direction: column; gap: 5px; }
    .field label { font-size: 12px; font-weight: 700; color: var(--text-sub); text-transform: uppercase; letter-spacing: .6px; }
    .inp { border: 1.5px solid var(--border); border-radius: 8px; padding: 9px 12px; font-size: 14px; color: var(--text); background: var(--surface); width: 100%; transition: border-color .15s; font-family: inherit; }
    .inp-sm { padding: 7px 10px; font-size: 13px; }

    .section-hd { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }
    .section-hd h2 { font-size: 22px; font-weight: 800; color: var(--text); }
    .section-label { font-size: 11px; font-weight: 800; color: var(--green-darkest); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 14px; }

    .recipe-grid { display: flex; flex-direction: column; gap: 10px; }
    .recipe-card { padding: 18px 20px; cursor: pointer; }
    .recipe-card-top { display: flex; align-items: flex-start; gap: 12px; }
    .recipe-card-body { flex: 1; min-width: 0; }
    .recipe-name { font-weight: 700; font-size: 17px; color: var(--text); margin-bottom: 4px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .recipe-desc { font-size: 13px; color: var(--text-muted); margin-bottom: 10px; }
    .recipe-meta { display: flex; gap: 14px; flex-wrap: wrap; }
    .recipe-meta span { font-size: 12px; color: var(--text-muted); display: flex; align-items: center; gap: 4px; }
    .card-actions { display: flex; gap: 5px; flex-shrink: 0; }

    .search-wrap { position: relative; margin-bottom: 16px; }
    .search-icon { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); pointer-events: none; color: var(--text-muted); }
    .search-input { width: 100%; border: 1.5px solid var(--border); border-radius: 12px; padding: 10px 12px 10px 38px; font-size: 14px; background: var(--surface); transition: border-color .15s; font-family: inherit; }

    .empty { text-align: center; padding: 56px 24px; color: var(--text-muted); }
    .empty-icon { font-size: 44px; margin-bottom: 14px; }
    .empty h3 { font-size: 17px; font-weight: 700; color: var(--text-sub); margin-bottom: 6px; }

    .detail-card { padding: 32px; }
    .detail-title { font-size: 28px; font-weight: 800; margin-bottom: 8px; }
    .detail-desc { color: var(--text-muted); font-size: 15px; margin-bottom: 20px; }
    .detail-meta { display: flex; gap: 18px; flex-wrap: wrap; padding-bottom: 20px; border-bottom: 1.5px solid var(--green-faint); margin-bottom: 24px; }
    .detail-meta span { display: flex; align-items: center; gap: 7px; font-size: 14px; color: var(--text-sub); }
    .ingredient-list { list-style: none; margin-bottom: 28px; }
    .ingredient-list li { display: flex; align-items: center; gap: 10px; padding: 8px 0; border-bottom: 1px solid var(--green-faint); font-size: 15px; }
    .ing-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--green-mid); flex-shrink: 0; }
    .ing-amount { font-weight: 600; min-width: 80px; color: var(--green-darkest); }
    .steps-list { list-style: none; margin-bottom: 32px; }
    .step-item { display: flex; gap: 16px; margin-bottom: 16px; }
    .step-num { min-width: 32px; height: 32px; border-radius: 50%; background: var(--green-light); color: var(--green-darkest); display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 800; flex-shrink: 0; }
    .step-text { font-size: 15px; color: var(--text-sub); line-height: 1.65; padding-top: 5px; }
    .detail-actions { display: flex; gap: 10px; flex-wrap: wrap; padding-top: 20px; border-top: 1.5px solid var(--green-faint); }

    .form-card { padding: 28px; }
    .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
    .col2 { grid-column: 1 / -1; }
    .form-section { margin-top: 24px; }
    .form-section-hd { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
    .form-section-label { font-size: 11px; font-weight: 800; color: var(--green-darkest); text-transform: uppercase; letter-spacing: 1px; }
    .ing-row { display: grid; grid-template-columns: 80px 72px 1fr 32px; gap: 8px; align-items: center; margin-bottom: 8px; }
    .step-row { display: flex; gap: 10px; align-items: flex-start; margin-bottom: 10px; }
    .step-row-num { min-width: 30px; height: 30px; border-radius: 50%; background: var(--green-dark); color: #fff; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 800; flex-shrink: 0; margin-top: 6px; }
    .form-footer { display: flex; gap: 10px; justify-content: flex-end; padding-top: 20px; border-top: 1.5px solid var(--green-faint); margin-top: 24px; }

    .week-grid { display: flex; flex-direction: column; gap: 9px; }
    .week-row { background: var(--surface); border-radius: 12px; padding: 13px 18px; border: 1.5px solid #E4F2E1; display: flex; align-items: center; gap: 14px; flex-wrap: wrap; }
    .week-day { min-width: 100px; font-weight: 700; font-size: 14px; color: var(--text-sub); }
    .week-tag { background: var(--green-light); color: var(--green-darkest); border-radius: 8px; padding: 4px 12px; font-size: 14px; font-weight: 600; display: flex; align-items: center; gap: 8px; }
    .week-empty { background: var(--green-faint); border: 1.5px dashed var(--border); border-radius: 8px; padding: 7px 16px; font-size: 13px; color: #aaa; cursor: pointer; flex: 1; text-align: left; font-family: inherit; transition: border-color .15s; }
    .week-empty:hover { border-color: var(--green-mid); color: var(--green-dark); }
    .combined-box { margin-top: 28px; background: var(--green-faint); border-radius: 16px; padding: 22px; border: 1px solid var(--border); }
    .combined-box h3 { font-size: 11px; font-weight: 800; color: var(--green-darkest); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 14px; }
    .combined-items { columns: 2; column-gap: 24px; }
    .combined-item { font-size: 14px; color: var(--text-sub); padding: 3px 0; display: flex; gap: 8px; break-inside: avoid; }

    .sel-list { display: flex; flex-direction: column; gap: 8px; margin-bottom: 22px; }
    .sel-item { display: flex; align-items: center; gap: 12px; background: var(--surface); border-radius: 12px; padding: 12px 16px; border: 1.5px solid #E4F2E1; cursor: pointer; transition: border-color .15s; user-select: none; }
    .sel-item.selected { border-color: var(--green-dark); }
    .chk { width: 20px; height: 20px; border-radius: 6px; border: 2px solid var(--border); background: transparent; display: flex; align-items: center; justify-content: center; flex-shrink: 0; transition: all .15s; }
    .chk.on { background: var(--green-dark); border-color: var(--green-dark); }
    .shop-box { background: var(--green-faint); border-radius: 16px; padding: 20px; border: 1px solid var(--border); margin-bottom: 16px; }
    .shop-item { display: flex; align-items: center; gap: 10px; cursor: pointer; padding: 5px 0; user-select: none; }
    .shop-item span { font-size: 14px; color: var(--text-sub); transition: all .1s; }
    .shop-item.done span { text-decoration: line-through; color: #aaa; }

    .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,.45); z-index: 200; display: none; align-items: center; justify-content: center; padding: 16px; }
    .modal-overlay.open { display: flex; }
    .modal-box { background: var(--surface); border-radius: 22px; padding: 26px; max-width: 400px; width: 100%; max-height: 85vh; display: flex; flex-direction: column; }
    .modal-hd { display: flex; justify-content: space-between; align-items: center; margin-bottom: 14px; }
    .modal-hd h3 { font-size: 17px; font-weight: 800; }
    .modal-search { border: 1.5px solid var(--border); border-radius: 8px; padding: 8px 12px; font-size: 14px; width: 100%; margin-bottom: 12px; font-family: inherit; }
    .modal-list { overflow-y: auto; flex: 1; display: flex; flex-direction: column; gap: 7px; }
    .modal-opt { background: var(--green-faint); border: 1.5px solid #E4F2E1; border-radius: 8px; padding: 10px 14px; text-align: left; cursor: pointer; font-size: 14px; font-weight: 600; color: var(--text); font-family: inherit; transition: background .12s; display: flex; justify-content: space-between; align-items: center; }
    .modal-opt:hover { background: var(--green-light); }

    #toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(80px); background: var(--green-darkest); color: #fff; padding: 10px 22px; border-radius: 999px; font-size: 14px; font-weight: 600; z-index: 300; transition: transform .25s ease; pointer-events: none; white-space: nowrap; }
    #toast.show { transform: translateX(-50%) translateY(0); }

    #loading { position: fixed; inset: 0; background: var(--bg); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 500; gap: 16px; }
    .spinner { width: 36px; height: 36px; border: 3px solid var(--green-light); border-top-color: var(--green-dark); border-radius: 50%; animation: spin .7s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }

    @media (max-width: 540px) {
      .form-grid { grid-template-columns: 1fr; }
      .combined-items { columns: 1; }
      .ing-row { grid-template-columns: 65px 58px 1fr 28px; }
      .logo-text { display: none; }
    }
  </style>
</head>
<body>

<div id="loading">
  <div class="spinner"></div>
  <p style="color:var(--green-dark);font-weight:600;font-size:15px;">Rezeptbuch wird geladen…</p>
</div>

<div id="app" style="display:none">
  <header>
    <div class="header-inner">
      <div class="logo">
        <div class="logo-icon">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20M4 19.5A2.5 2.5 0 0 0 6.5 22H20V2H6.5A2.5 2.5 0 0 0 4 4.5v15z"/></svg>
        </div>
        <span class="logo-text">Mein Rezeptbuch</span>
      </div>
      <nav>
        <button class="nav-btn active" id="nav-recipes" onclick="switchTab('recipes')">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20M4 19.5A2.5 2.5 0 0 0 6.5 22H20V2H6.5A2.5 2.5 0 0 0 4 4.5v15z"/></svg>
          <span>Rezepte</span>
        </button>
        <button class="nav-btn" id="nav-week" onclick="switchTab('week')">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
          <span>Wochenplan</span>
        </button>
        <button class="nav-btn" id="nav-shopping" onclick="switchTab('shopping')">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4zM3 6h18M16 10a4 4 0 01-8 0"/></svg>
          <span>Einkauf</span>
        </button>
      </nav>
    </div>
  </header>
  <main id="content"></main>
</div>

<div id="toast"></div>

<div class="modal-overlay" id="modal" onclick="onModalBgClick(event)">
  <div class="modal-box">
    <div class="modal-hd">
      <h3 id="modal-title">Rezept wählen</h3>
      <button class="btn btn-ghost btn-icon" onclick="closeModal()">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>
    <input class="modal-search" id="modal-search" placeholder="Suchen…" oninput="filterModal(this.value)" />
    <div class="modal-list" id="modal-list"></div>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, doc, onSnapshot, addDoc, setDoc, deleteDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const FB = {
  apiKey: "AIzaSyBK5h3LdJ_1s5tByynBDOdeMGffoCyJO20",
  authDomain: "rezeptbuch-253bc.firebaseapp.com",
  projectId: "rezeptbuch-253bc",
  storageBucket: "rezeptbuch-253bc.firebasestorage.app",
  messagingSenderId: "324939912260",
  appId: "1:324939912260:web:9e3daf8c3365d6305a5811"
};

const fbApp = initializeApp(FB);
const db = getFirestore(fbApp);

// ── State ──────────────────────────────────────────────────────────────────
const S = {
  recipes: [],
  weekPlan: {},
  tab: "recipes",
  view: "list",
  editing: null,
  viewing: null,
  search: "",
  shopSelected: [],
  shopChecked: {},
  modalMode: "week",  // "week" | "day"
  modalDay: null,
  modalRecipeId: null,
};

const DAYS = ["Montag","Dienstag","Mittwoch","Donnerstag","Freitag","Samstag","Sonntag"];

function uid() { return Date.now().toString(36) + Math.random().toString(36).slice(2,7); }

// ── Firebase ───────────────────────────────────────────────────────────────
onSnapshot(collection(db, "recipes"), snap => {
  S.recipes = snap.docs.map(d => ({ id: d.id, ...d.data() }));
  render();
});

getDoc(doc(db, "weekplan", "current")).then(d => {
  if (d.exists()) S.weekPlan = d.data();
  render();
});

async function fbSaveRecipe(r) {
  const { id, ...data } = r;
  if (id) { await setDoc(doc(db, "recipes", id), data); }
  else { await addDoc(collection(db, "recipes"), data); }
}

async function fbDeleteRecipe(id) {
  await deleteDoc(doc(db, "recipes", id));
  let changed = false;
  for (const day of DAYS) {
    if (S.weekPlan[day] && S.weekPlan[day].id === id) { delete S.weekPlan[day]; changed = true; }
  }
  if (changed) await fbSaveWeek();
}

async function fbSaveWeek() {
  await setDoc(doc(db, "weekplan", "current"), S.weekPlan);
}

// ── Icons ──────────────────────────────────────────────────────────────────
function svg(path, size) {
  size = size || 16;
  return '<svg width="' + size + '" height="' + size + '" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="' + path + '"/></svg>';
}
const I = {
  plus:  "M12 5v14M5 12h14",
  trash: "M3 6h18M8 6V4h8v2M19 6l-1 14H6L5 6",
  edit:  "M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z",
  x:     "M18 6L6 18M6 6l12 12",
  check: "M20 6L9 17l-5-5",
  copy:  "M8 4H6a2 2 0 00-2 2v12a2 2 0 002 2h8a2 2 0 002-2v-2M8 4h8a2 2 0 012 2v8M8 4a2 2 0 012-2h4a2 2 0 012 2",
  dl:    "M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4M7 10l5 5 5-5M12 15V3",
  back:  "M19 12H5M12 5l-7 7 7 7",
  users: "M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2M9 11a4 4 0 100-8 4 4 0 000 8zM23 21v-2a4 4 0 00-3-3.87M16 3.13a4 4 0 010 7.75",
  clock: "M12 22c5.52 0 10-4.48 10-10S17.52 2 12 2 2 6.48 2 12s4.48 10 10 10zM12 6v6l4 2",
  cal:   "M3 4h18M3 8h18M3 12h18M3 16h18M3 20h10M16 3v18",
};

// ── Helpers ────────────────────────────────────────────────────────────────
function esc(s) {
  return String(s || "").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
}

function toast(msg) {
  const t = document.getElementById("toast");
  t.textContent = msg;
  t.classList.add("show");
  setTimeout(() => t.classList.remove("show"), 2200);
}

function dlTxt(name, content) {
  const b = new Blob([content], { type: "text/plain;charset=utf-8" });
  const u = URL.createObjectURL(b);
  const a = document.createElement("a");
  a.href = u; a.download = name; a.click();
  URL.revokeObjectURL(u);
}

function fmtIng(i) {
  return [i.amount, i.unit, i.name].filter(Boolean).join(" ");
}

function mergeIngredients(recipeList) {
  const map = {};
  recipeList.forEach(function(r) {
    (r.ingredients || []).filter(function(i) { return i.name; }).forEach(function(ing) {
      const key = ing.name.toLowerCase() + "__" + (ing.unit || "");
      if (map[key]) {
        const a = parseFloat(map[key].amount) || 0;
        const b = parseFloat(ing.amount) || 0;
        map[key] = Object.assign({}, map[key], { amount: (a + b) ? String(a + b) : "" });
      } else {
        map[key] = Object.assign({}, ing);
      }
    });
  });
  return Object.values(map);
}

function shopExportText() {
  const sel = S.recipes.filter(function(r) { return S.shopSelected.indexOf(r.id) >= 0; });
  const names = sel.map(function(r) { return r.name; }).join(", ");
  const ings = mergeIngredients(sel);
  return ["Einkaufsliste fuer: " + names, ""].concat(ings.map(function(i) { return "- " + fmtIng(i); })).join("\n");
}

function weekExportText() {
  const planned = DAYS.filter(function(d) { return S.weekPlan[d]; });
  const rList = planned.map(function(d) { return S.weekPlan[d]; });
  const ings = mergeIngredients(rList);
  const lines = ["Wocheneinkaufsliste", ""];
  planned.forEach(function(d) { lines.push(d + ": " + S.weekPlan[d].name); });
  lines.push("", "---", "Zutaten:", "");
  ings.forEach(function(i) { lines.push("- " + fmtIng(i)); });
  return lines.join("\n");
}

// ── Tab switching (exposed globally) ──────────────────────────────────────
window.switchTab = function(tab) {
  S.tab = tab; S.view = "list"; S.editing = null; S.viewing = null; S.search = "";
  ["recipes","week","shopping"].forEach(function(t) {
    document.getElementById("nav-" + t).classList.toggle("active", t === tab);
  });
  render();
};

// ── Render ─────────────────────────────────────────────────────────────────
function render() {
  document.getElementById("loading").style.display = "none";
  document.getElementById("app").style.display = "flex";
  const el = document.getElementById("content");
  if (S.tab === "recipes") {
    if (S.view === "list")   el.innerHTML = tplList();
    if (S.view === "form")   el.innerHTML = tplForm();
    if (S.view === "detail") el.innerHTML = tplDetail();
  } else if (S.tab === "week") {
    el.innerHTML = tplWeek();
  } else {
    el.innerHTML = tplShopping();
  }
}

// ── Templates ──────────────────────────────────────────────────────────────
function tplList() {
  const q = S.search.toLowerCase();
  const list = S.recipes.filter(function(r) { return r.name.toLowerCase().indexOf(q) >= 0; });
  let cards = "";
  if (list.length === 0) {
    cards = '<div class="empty"><div class="empty-icon">&#128214;</div><h3>' + (S.search ? "Keine Treffer" : "Noch keine Rezepte") + '</h3><p>' + (S.search ? "Anderen Begriff versuchen." : "F&uuml;ge dein erstes Rezept hinzu!") + '</p></div>';
  } else {
    list.forEach(function(r) {
      const ings = (r.ingredients || []).filter(function(i) { return i.name; }).length;
      cards += '<div class="card recipe-card" onclick="doView(\'' + r.id + '\')">';
      cards += '<div class="recipe-card-top"><div class="recipe-card-body">';
      cards += '<div class="recipe-name">' + esc(r.name) + '</div>';
      if (r.description) cards += '<div class="recipe-desc">' + esc(r.description) + '</div>';
      cards += '<div class="recipe-meta">';
      if (r.servings) cards += '<span>' + svg(I.users, 12) + ' ' + esc(r.servings) + ' Portionen</span>';
      if (r.prepTime) cards += '<span>' + svg(I.clock, 12) + ' ' + esc(r.prepTime) + '</span>';
      cards += '<span>' + ings + ' Zutaten</span></div></div>';
      cards += '<div class="card-actions" onclick="event.stopPropagation()">';
      cards += '<button class="btn btn-ghost btn-icon" onclick="doEdit(\'' + r.id + '\')" title="Bearbeiten">' + svg(I.edit) + '</button>';
      cards += '<button class="btn btn-danger btn-icon" onclick="doDelete(\'' + r.id + '\')" title="L&ouml;schen">' + svg(I.trash) + '</button>';
      cards += '</div></div></div>';
    });
  }
  return '<div class="section-hd"><h2>Rezepte <span style="color:var(--text-muted);font-weight:400;font-size:16px">(' + S.recipes.length + ')</span></h2>'
    + '<button class="btn btn-primary" onclick="doNew()">' + svg(I.plus) + ' Neues Rezept</button></div>'
    + '<div class="search-wrap">'
    + '<span class="search-icon">' + svg(I.x.replace("M18 6L6 18M6 6l12 12","M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0"), 16) + '</span>'
    + '<input class="search-input" placeholder="Rezepte durchsuchen\u2026" value="' + esc(S.search) + '" oninput="doSearch(this.value)" />'
    + '</div>'
    + '<div class="recipe-grid">' + cards + '</div>';
}

function tplDetail() {
  const r = S.viewing;
  if (!r) return "";
  const ings = (r.ingredients || []).filter(function(i) { return i.name; });
  const steps = (r.steps || []).filter(function(s) { return s.text; });
  let ingRows = "";
  ings.forEach(function(i) {
    ingRows += '<li><span class="ing-dot"></span><span class="ing-amount">' + esc([i.amount, i.unit].filter(Boolean).join(" ") || "—") + '</span><span>' + esc(i.name) + '</span></li>';
  });
  let stepRows = "";
  steps.forEach(function(s, idx) {
    stepRows += '<li class="step-item"><div class="step-num">' + (idx+1) + '</div><p class="step-text">' + esc(s.text) + '</p></li>';
  });
  return '<button class="btn btn-ghost btn-sm" onclick="doBack()" style="margin-bottom:20px">' + svg(I.back) + ' Zur&uuml;ck</button>'
    + '<div class="card detail-card">'
    + '<h1 class="detail-title">' + esc(r.name) + '</h1>'
    + (r.description ? '<p class="detail-desc">' + esc(r.description) + '</p>' : '')
    + '<div class="detail-meta">'
    + (r.servings ? '<span>' + svg(I.users, 16) + ' ' + esc(r.servings) + ' Portionen</span>' : '')
    + (r.prepTime ? '<span>' + svg(I.clock, 16) + ' ' + esc(r.prepTime) + '</span>' : '')
    + '</div>'
    + '<p class="section-label">Zutaten</p><ul class="ingredient-list">' + ingRows + '</ul>'
    + '<p class="section-label">Zubereitung</p><ol class="steps-list">' + stepRows + '</ol>'
    + '<div class="detail-actions">'
    + '<button class="btn btn-primary" onclick="doCopyDetail()">' + svg(I.copy) + ' Einkaufsliste kopieren</button>'
    + '<button class="btn btn-secondary" onclick="doDlDetail()">' + svg(I.dl) + ' Als .txt</button>'
    + '<button class="btn btn-secondary" onclick="doDetailToWeek()">' + svg(I.cal) + ' Zum Wochenplan</button>'
    + '</div></div>';
}

function tplForm() {
  const r = S.editing || { id: null, name: "", description: "", servings: "2", prepTime: "", ingredients: [{id:uid(),amount:"",unit:"",name:""}], steps: [{id:uid(),text:""}] };
  let ingRows = "";
  (r.ingredients || []).forEach(function(ing) {
    ingRows += '<div class="ing-row" data-ing="' + ing.id + '">'
      + '<input class="inp inp-sm" data-f="amount" value="' + esc(ing.amount) + '" placeholder="Menge" />'
      + '<input class="inp inp-sm" data-f="unit" value="' + esc(ing.unit) + '" placeholder="Einheit" />'
      + '<input class="inp inp-sm" data-f="name" value="' + esc(ing.name) + '" placeholder="Zutat" />'
      + '<button class="remove-btn" onclick="removeIng(\'' + ing.id + '\')">' + svg(I.x, 14) + '</button>'
      + '</div>';
  });
  let stepRows = "";
  (r.steps || []).forEach(function(s, idx) {
    stepRows += '<div class="step-row" data-step="' + s.id + '">'
      + '<div class="step-row-num">' + (idx+1) + '</div>'
      + '<textarea class="inp" rows="2" data-f="text" placeholder="Schritt ' + (idx+1) + '\u2026" style="flex:1;resize:vertical">' + esc(s.text) + '</textarea>'
      + '<button class="remove-btn" onclick="removeStep(\'' + s.id + '\')" style="margin-top:6px">' + svg(I.x, 14) + '</button>'
      + '</div>';
  });
  const eid = esc(r.id || "");
  return '<h2 style="font-size:22px;font-weight:800;margin-bottom:20px">' + (r.id ? 'Rezept bearbeiten' : 'Neues Rezept') + '</h2>'
    + '<div class="card form-card">'
    + '<div class="form-grid">'
    + '<div class="field col2"><label>Rezeptname *</label><input class="inp" id="f-name" value="' + esc(r.name) + '" placeholder="z.B. Spaghetti Carbonara" /></div>'
    + '<div class="field"><label>Portionen</label><input class="inp" id="f-srv" type="number" value="' + esc(r.servings) + '" /></div>'
    + '<div class="field"><label>Zubereitungszeit</label><input class="inp" id="f-time" value="' + esc(r.prepTime || "") + '" placeholder="z.B. 30 min" /></div>'
    + '<div class="field col2"><label>Kurzbeschreibung</label><textarea class="inp" id="f-desc" rows="2" style="resize:vertical" placeholder="Was macht dieses Rezept besonders?">' + esc(r.description || "") + '</textarea></div>'
    + '</div>'
    + '<div class="form-section"><div class="form-section-hd"><span class="form-section-label">Zutaten *</span><button class="btn btn-ghost btn-sm" onclick="addIng()">' + svg(I.plus, 14) + ' Hinzuf&uuml;gen</button></div>'
    + '<div id="ing-list">' + ingRows + '</div></div>'
    + '<div class="form-section"><div class="form-section-hd"><span class="form-section-label">Zubereitung *</span><button class="btn btn-ghost btn-sm" onclick="addStep()">' + svg(I.plus, 14) + ' Schritt</button></div>'
    + '<div id="step-list">' + stepRows + '</div></div>'
    + '<div class="form-footer">'
    + '<button class="btn btn-secondary" onclick="doBack()">Abbrechen</button>'
    + '<button class="btn btn-primary" onclick="doSave(\'' + eid + '\')">' + svg(I.check) + ' Speichern</button>'
    + '</div></div>';
}

function tplWeek() {
  const planned = DAYS.filter(function(d) { return S.weekPlan[d]; });
  const hasAny = planned.length > 0;
  let rows = "";
  DAYS.forEach(function(day) {
    const r = S.weekPlan[day];
    rows += '<div class="week-row"><span class="week-day">' + day + '</span>';
    if (r) {
      rows += '<div class="week-tag">' + esc(r.name) + '<button style="background:none;border:none;cursor:pointer;color:#6B7280;display:flex;padding:2px" onclick="removeFromWeek(\'' + day + '\')">' + svg(I.x, 14) + '</button></div>';
    } else {
      rows += '<button class="week-empty" onclick="openWeekModal(\'' + day + '\')">+ Rezept ausw&auml;hlen&hellip;</button>';
    }
    rows += '</div>';
  });

  let exportBtns = "";
  if (hasAny) {
    exportBtns = '<div style="display:flex;gap:8px">'
      + '<button class="btn btn-secondary btn-sm" onclick="doCopyWeek()">' + svg(I.copy, 14) + ' Kopieren</button>'
      + '<button class="btn btn-primary btn-sm" onclick="doDlWeek()">' + svg(I.dl, 14) + ' Als .txt</button>'
      + '</div>';
  }

  let combined = "";
  if (hasAny) {
    const rList = planned.map(function(d) { return S.weekPlan[d]; });
    const ings = mergeIngredients(rList);
    let items = "";
    ings.forEach(function(i) {
      items += '<div class="combined-item"><span style="color:var(--green-mid)">&#8226;</span><span>' + esc(fmtIng(i)) + '</span></div>';
    });
    combined = '<div class="combined-box"><h3>Kombinierte Einkaufsliste (' + planned.length + ' Rezepte)</h3><div class="combined-items">' + items + '</div></div>';
  }

  return '<div class="section-hd"><h2>Wochenplan</h2>' + exportBtns + '</div>'
    + '<div class="week-grid">' + rows + '</div>' + combined;
}

function tplShopping() {
  const sel = S.recipes.filter(function(r) { return S.shopSelected.indexOf(r.id) >= 0; });
  const ings = mergeIngredients(sel);
  let selItems = "";
  if (S.recipes.length === 0) {
    selItems = '<p style="color:var(--text-muted);font-size:14px">Noch keine Rezepte vorhanden.</p>';
  } else {
    S.recipes.forEach(function(r) {
      const on = S.shopSelected.indexOf(r.id) >= 0;
      selItems += '<div class="sel-item' + (on ? ' selected' : '') + '" onclick="toggleShopR(\'' + r.id + '\')">'
        + '<div class="chk' + (on ? ' on' : '') + '">' + (on ? svg(I.check, 11) : '') + '</div>'
        + '<span style="font-weight:600;font-size:15px">' + esc(r.name) + '</span>'
        + (r.prepTime ? '<span style="font-size:12px;color:var(--text-muted);margin-left:auto">' + esc(r.prepTime) + '</span>' : '')
        + '</div>';
    });
  }
  let shopList = "";
  if (ings.length > 0) {
    let items = "";
    ings.forEach(function(i) {
      const key = i.name + "__" + (i.unit || "");
      const done = !!S.shopChecked[key];
      items += '<div class="shop-item' + (done ? ' done' : '') + '" onclick="toggleShopI(\'' + key.replace(/'/g,"\\'") + '\')">'
        + '<div class="chk' + (done ? ' on' : '') + '">' + (done ? svg(I.check, 11) : '') + '</div>'
        + '<span>' + esc(fmtIng(i)) + '</span></div>';
    });
    shopList = '<div class="shop-box"><p style="font-size:11px;font-weight:800;color:var(--green-darkest);text-transform:uppercase;letter-spacing:1px;margin-bottom:14px">Zutaten (' + ings.length + ')</p>' + items + '</div>'
      + '<div style="display:flex;gap:10px;flex-wrap:wrap">'
      + '<button class="btn btn-secondary" onclick="doCopyShopping()">' + svg(I.copy) + ' Kopieren</button>'
      + '<button class="btn btn-primary" onclick="doDlShopping()">' + svg(I.dl) + ' Als .txt</button>'
      + '</div>';
  }
  return '<h2 style="font-size:22px;font-weight:800;margin-bottom:8px">Einkaufsliste</h2>'
    + '<p style="font-size:14px;color:var(--text-muted);margin-bottom:18px">W&auml;hle Rezepte aus, um eine kombinierte Einkaufsliste zu erstellen.</p>'
    + '<div class="sel-list">' + selItems + '</div>'
    + shopList;
}

// ── Modal ──────────────────────────────────────────────────────────────────
function openWeekModal(day) {
  S.modalMode = "week";
  S.modalDay = day;
  document.getElementById("modal-title").textContent = day;
  document.getElementById("modal-search").style.display = "";
  document.getElementById("modal-search").value = "";
  document.getElementById("modal").classList.add("open");
  renderModalList("");
}
window.openWeekModal = openWeekModal;

function openDayModal(recipeId) {
  S.modalMode = "day";
  S.modalRecipeId = recipeId;
  const r = S.recipes.find(function(x) { return x.id === recipeId; });
  document.getElementById("modal-title").textContent = (r ? r.name : "") + " \u2192 Tag w\u00e4hlen";
  document.getElementById("modal-search").style.display = "none";
  document.getElementById("modal").classList.add("open");
  const el = document.getElementById("modal-list");
  let html = "";
  DAYS.forEach(function(day) {
    const existing = S.weekPlan[day] ? S.weekPlan[day].name : "";
    html += '<button class="modal-opt" onclick="assignDay(\'' + day + '\')">' + day + (existing ? '<span style="font-size:12px;color:var(--text-muted)">' + esc(existing) + '</span>' : '') + '</button>';
  });
  el.innerHTML = html;
}

window.filterModal = function(q) { renderModalList(q); };

function renderModalList(q) {
  const list = S.recipes.filter(function(r) { return r.name.toLowerCase().indexOf(q.toLowerCase()) >= 0; });
  const el = document.getElementById("modal-list");
  if (!el) return;
  if (list.length === 0) { el.innerHTML = '<p style="color:var(--text-muted);font-size:14px;text-align:center;padding:20px">Keine Rezepte gefunden.</p>'; return; }
  let html = "";
  list.forEach(function(r) {
    html += '<button class="modal-opt" onclick="assignWeek(\'' + r.id + '\')">' + esc(r.name) + (r.prepTime ? '<span style="font-size:12px;color:var(--text-muted)">' + esc(r.prepTime) + '</span>' : '') + '</button>';
  });
  el.innerHTML = html;
}

window.closeModal = function() { document.getElementById("modal").classList.remove("open"); };
window.onModalBgClick = function(e) { if (e.target === document.getElementById("modal")) closeModal(); };

window.assignWeek = async function(rid) {
  const r = S.recipes.find(function(x) { return x.id === rid; });
  if (!r || !S.modalDay) return;
  S.weekPlan[S.modalDay] = r;
  await fbSaveWeek();
  closeModal();
  render();
};

window.assignDay = async function(day) {
  const r = S.recipes.find(function(x) { return x.id === S.modalRecipeId; });
  if (!r) return;
  S.weekPlan[day] = r;
  await fbSaveWeek();
  closeModal();
  toast(r.name + " \u2192 " + day + " \u2713");
  render();
};

// ── Global action handlers ─────────────────────────────────────────────────
window.doNew    = function() { S.editing = null; S.view = "form"; render(); };
window.doBack   = function() { S.view = "list"; S.editing = null; S.viewing = null; render(); };
window.doSearch = function(q) { S.search = q; render(); };

window.doEdit = function(id) {
  S.editing = S.recipes.find(function(r) { return r.id === id; });
  S.view = "form"; render();
};

window.doView = function(id) {
  S.viewing = S.recipes.find(function(r) { return r.id === id; });
  S.view = "detail"; render();
};

window.doDelete = async function(id) {
  if (!confirm("Rezept wirklich l\u00f6schen?")) return;
  await fbDeleteRecipe(id);
  toast("Rezept gel\u00f6scht.");
};

window.addIng = function() {
  const el = document.getElementById("ing-list");
  const id = uid();
  const div = document.createElement("div");
  div.className = "ing-row"; div.dataset.ing = id;
  div.innerHTML = '<input class="inp inp-sm" data-f="amount" placeholder="Menge" />'
    + '<input class="inp inp-sm" data-f="unit" placeholder="Einheit" />'
    + '<input class="inp inp-sm" data-f="name" placeholder="Zutat" />'
    + '<button class="remove-btn" onclick="removeIng(\'' + id + '\')">' + svg(I.x, 14) + '</button>';
  el.appendChild(div);
};

window.removeIng = function(id) {
  const el = document.querySelector('[data-ing="' + id + '"]');
  if (el && document.querySelectorAll("[data-ing]").length > 1) el.remove();
};

window.addStep = function() {
  const el = document.getElementById("step-list");
  const id = uid();
  const n = el.children.length + 1;
  const div = document.createElement("div");
  div.className = "step-row"; div.dataset.step = id;
  div.innerHTML = '<div class="step-row-num">' + n + '</div>'
    + '<textarea class="inp" rows="2" data-f="text" placeholder="Schritt ' + n + '\u2026" style="flex:1;resize:vertical"></textarea>'
    + '<button class="remove-btn" onclick="removeStep(\'' + id + '\')" style="margin-top:6px">' + svg(I.x, 14) + '</button>';
  el.appendChild(div);
};

window.removeStep = function(id) {
  const el = document.querySelector('[data-step="' + id + '"]');
  if (el && document.querySelectorAll("[data-step]").length > 1) el.remove();
};

window.doSave = async function(existingId) {
  const name = document.getElementById("f-name").value.trim();
  if (!name) { alert("Bitte einen Rezeptnamen eingeben."); return; }
  const ings = [];
  document.querySelectorAll("[data-ing]").forEach(function(row) {
    ings.push({ id: row.dataset.ing, amount: row.querySelector('[data-f="amount"]').value.trim(), unit: row.querySelector('[data-f="unit"]').value.trim(), name: row.querySelector('[data-f="name"]').value.trim() });
  });
  const steps = [];
  document.querySelectorAll("[data-step]").forEach(function(row) {
    steps.push({ id: row.dataset.step, text: row.querySelector('[data-f="text"]').value.trim() });
  });
  const recipe = { id: existingId || null, name: name, description: document.getElementById("f-desc").value.trim(), servings: document.getElementById("f-srv").value, prepTime: document.getElementById("f-time").value.trim(), ingredients: ings, steps: steps };
  await fbSaveRecipe(recipe);
  let changed = false;
  DAYS.forEach(function(day) {
    if (S.weekPlan[day] && S.weekPlan[day].id === existingId) { S.weekPlan[day] = recipe; changed = true; }
  });
  if (changed) await fbSaveWeek();
  toast(existingId ? "Rezept aktualisiert \u2713" : "Rezept gespeichert \u2713");
  S.view = "list"; S.editing = null; render();
};

window.removeFromWeek = async function(day) {
  delete S.weekPlan[day];
  await fbSaveWeek();
  render();
};

window.doCopyWeek    = function() { navigator.clipboard.writeText(weekExportText()).then(function() { toast("Kopiert! \u2713"); }); };
window.doDlWeek      = function() { dlTxt("Wocheneinkaufsliste.txt", weekExportText()); };
window.doCopyShopping = function() { navigator.clipboard.writeText(shopExportText()).then(function() { toast("Kopiert! \u2713"); }); };
window.doDlShopping  = function() { dlTxt("Einkaufsliste.txt", shopExportText()); };

window.doCopyDetail = function() {
  const r = S.viewing; if (!r) return;
  const ings = (r.ingredients || []).filter(function(i) { return i.name; });
  const txt = ["Einkaufsliste: " + r.name, ""].concat(ings.map(function(i) { return "- " + fmtIng(i); })).join("\n");
  navigator.clipboard.writeText(txt).then(function() { toast("Kopiert! \u2713"); });
};

window.doDlDetail = function() {
  const r = S.viewing; if (!r) return;
  const ings = (r.ingredients || []).filter(function(i) { return i.name; });
  const txt = ["Einkaufsliste: " + r.name, ""].concat(ings.map(function(i) { return "- " + fmtIng(i); })).join("\n");
  dlTxt("Einkaufsliste_" + r.name.replace(/\s+/g, "_") + ".txt", txt);
};

window.doDetailToWeek = function() {
  if (!S.viewing) return;
  openDayModal(S.viewing.id);
};

window.toggleShopR = function(id) {
  const idx = S.shopSelected.indexOf(id);
  if (idx >= 0) { S.shopSelected.splice(idx, 1); } else { S.shopSelected.push(id); }
  render();
};

window.toggleShopI = function(key) {
  S.shopChecked[key] = !S.shopChecked[key];
  render();
};

// Initial render
render();
</script>
</body>
</html>
